<!DOCTYPE html>
<html>
<head>
    <title>CNN Image Recognition System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
            background-color: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        input {
            margin-top: 10px;
        }

        h2, h3 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>CNN-Based Image Recognition System</h2>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required>
            <br>
            <button type="submit">Upload and Predict</button>
        </form>

        {% if image_path %}
            <h3>Uploaded Image</h3>
            <img src="{{ image_path }}" width="250">
        {% endif %}

        {% if prediction %}
            <h3>Predicted Label: {{ prediction }}</h3>
        {% endif %}
    </div>
</body>
</html>
